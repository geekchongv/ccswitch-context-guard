name: Feature request
description: Propose a use case or product improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe what you cannot do today and who is affected.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Context recovery
        - Claude Code integration
        - Claude Desktop integration
        - Multimodal routing
        - Desktop UI
        - Packaging and release
        - Documentation
        - Other
    validations:
      required: true
