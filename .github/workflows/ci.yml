name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Validate GUI references
        run: npm run check:gui

      - name: Create packaging secret sentinel
        shell: pwsh
        run: |
          '{"vision":{"apiKey":"CCPROXY_CI_SECRET_SENTINEL_7f36d1"}}' | Set-Content -Encoding utf8 config.json
          "CCPROXY_SECRET_SENTINEL=CCPROXY_CI_SECRET_SENTINEL_7f36d1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build sanitized portable package
        run: npm run package:gui

      - name: Packaged context-rescue smoke test
        run: npm run smoke:packaged

      - name: Upload verified portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: CCProxy-Agent-${{ github.sha }}
          path: |
            release-gui-v*/CCProxy-Agent-v*.exe
            release-gui-v*/SHA256SUMS.txt
            release-gui-v*/config.example.json
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check and test on macOS
        run: |
          npm run check
          npm test
          npm run check:gui
      - name: Create packaging secret sentinel
        run: |
          printf '%s\n' '{"vision":{"apiKey":"CCPROXY_CI_SECRET_SENTINEL_7f36d1"}}' > config.json
          echo 'CCPROXY_SECRET_SENTINEL=CCPROXY_CI_SECRET_SENTINEL_7f36d1' >> "$GITHUB_ENV"
      - name: Build macOS DMG and ZIP
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run package:gui:mac
      - uses: actions/upload-artifact@v7
        with:
          name: CCProxy-Agent-macOS-${{ github.sha }}
          path: |
            release-gui-v*/CCProxy-Agent-v*.dmg
            release-gui-v*/CCProxy-Agent-v*.zip
          if-no-files-found: error
